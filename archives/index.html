<div id="password-protection" style="display: none;">
  <div class="password-container">
    <h2>请输入访问密码</h2>

<style>
.password-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  text-align: center;
  z-index: 9999;
}

.password-container input {
  margin: 10px 0;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 4px;
  width: 200px;
}

.password-container button {
  background: #10b981;
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 4px;
  cursor: pointer;
}

.password-container button:hover {
  background: #059669;
}
</style>

<script>
const CORRECT_PASSWORD = '123456'; // 设置您的密码

function checkPassword() {
  const input = document.getElementById('password-input');
  const content = document.getElementById('content');
  const protection = document.getElementById('password-protection');
  
  if (input.value === CORRECT_PASSWORD) {
    content.style.display = 'block';
    protection.style.display = 'none';
    localStorage.setItem('blog_password', CORRECT_PASSWORD);
  } else {
    alert('密码错误，请重试！');
  }
}

// 页面加载时检查是否已经输入过密码
window.onload = function() {
  const content = document.getElementById('content');
  const protection = document.getElementById('password-protection');
  
  if (localStorage.getItem('blog_password') === CORRECT_PASSWORD) {
    content.style.display = 'block';
    protection.style.display = 'none';
  } else {
    content.style.display = 'none';
    protection.style.display = 'block';
  }
}
</script>
